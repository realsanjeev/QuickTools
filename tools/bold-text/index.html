<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Bold Text Generator | QuickTools</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #f8fafc;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            margin-bottom: 1rem;
            transition: var(--transition);
        }
        .result-item:hover {
            border-color: var(--primary-emerald);
            background: #fff;
        }
        .result-text {
            font-size: 1.2rem;
            word-break: break-all;
        }
        .copy-btn {
            background: var(--primary-gradient);
            color: white;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }
        .style-label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        #text-input {
            font-size: 1.2rem;
            padding: 1rem;
            height: 120px;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-content">
            <a href="../../index.html" class="logo">QuickTools</a>
            <nav><a href="../../index.html" class="btn">Back to Home</a></nav>
        </div>
    </header>

    <main class="container tool-container">
        <div class="tool-header">
            <h1>Facebook <span class="gradient-text">Bold Text</span> Generator</h1>
            <p>Generate stylish text for Facebook, Instagram, and Twitter posts.</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Input Text</label>
                <textarea id="text-input" placeholder="Type or paste your text here..." autofocus>Hello World!</textarea>
            </div>

            <div id="results">
                <!-- Results will be injected here -->
            </div>
        </div>
    </main>

    <script>
        const input = document.getElementById('text-input');
        const results = document.getElementById('results');

        const MAP = {
            bold_serif: {
                upper: 'рқҗҖрқҗҒрқҗӮрқҗғрқҗ„рқҗ…рқҗҶрқҗҮрқҗҲрқҗүрқҗҠрқҗӢрқҗҢрқҗҚрқҗҺрқҗҸрқҗҗрқҗ‘рқҗ’рқҗ“рқҗ”рқҗ•рқҗ–рқҗ—рқҗҳрқҗҷ',
                lower: 'рқҗҡрқҗӣрқҗңрқҗқрқҗһрқҗҹрқҗ рқҗЎрқҗўрқҗЈрқҗӨрқҗҘрқҗҰрқҗ§рқҗЁрқҗ©рқҗӘрқҗ«рқҗ¬рқҗӯрқҗ®рқҗҜрқҗ°рқҗұрқҗІрқҗі',
                digits: 'рқҹҺрқҹҸрқҹҗрқҹ‘рқҹ’рқҹ“рқҹ”рқҹ•рқҹ–рқҹ—'
            },
            bold_sans: {
                upper: 'рқ—”рқ—•рқ—–рқ——рқ—ҳрқ—ҷрқ—ҡрқ—ӣрқ—ңрқ—қрқ—һрқ—ҹрқ— рқ—Ўрқ—ўрқ—Јрқ—Өрқ—Ҙрқ—Ұрқ—§рқ—Ёрқ—©рқ—Әрқ—«рқ—¬рқ—ӯ',
                lower: 'рқ—®рқ—Ҝрқ—°рқ—ұрқ—Ірқ—ірқ—ҙрқ—өрқ—¶рқ—·рқ—ёрқ—№рқ—әрқ—»рқ—јрқ—Ҫрқ—ҫрқ—ҝрқҳҖрқҳҒрқҳӮрқҳғрқҳ„рқҳ…рқҳҶрқҳҮ',
                digits: 'рқҹ¬рқҹӯрқҹ®рқҹҜрқҹ°рқҹұрқҹІрқҹірқҹҙрқҹө'
            },
            italic_serif: {
                upper: 'рқҗҙрқҗөрқҗ¶рқҗ·рқҗёрқҗ№рқҗәрқҗ»рқҗјрқҗҪрқҗҫрқҗҝрқ‘Җрқ‘Ғрқ‘Ӯрқ‘ғрқ‘„рқ‘…рқ‘Ҷрқ‘Үрқ‘Ҳрқ‘үрқ‘Ҡрқ‘Ӣрқ‘Ңрқ‘Қ',
                lower: 'рқ‘Һрқ‘Ҹрқ‘җрқ‘‘рқ‘’рқ‘“рқ‘”в„Һрқ‘–рқ‘—рқ‘ҳрқ‘ҷрқ‘ҡрқ‘ӣрқ‘ңрқ‘қрқ‘һрқ‘ҹрқ‘ рқ‘Ўрқ‘ўрқ‘Јрқ‘Өрқ‘Ҙрқ‘Ұрқ‘§'
            },
            bold_italic_serif: {
                upper: 'рқ‘Ёр‘‘‘рқ‘Әрқ‘«рқ‘¬рқ‘ӯрқ‘®рқ‘Ҝрқ‘°рқ‘ұрқ‘Ірқ‘ірқ‘ҙрқ‘өрқ‘¶рқ‘·рқ‘ёрқ‘№рқ‘әрқ‘»рқ‘јрқ‘Ҫрқ‘ҫрқ‘ҝрқ’Җрқ’Ғ',
                lower: 'рқ’Ӯрқ’ғрқ’„рқ’…рқ’Ҷрқ’Үрқ’Ҳрқ’үрқ’Ҡрқ’Ӣрқ’Ңрқ’Қрқ’Һрқ’Ҹрқ’җрқ’‘рқ’’рқ’“рқ’”рқ’•рқ’–рқ’—рқ’ҳрқ’ҷрқ’ҡрқ’ӣ'
            },
            script: {
                upper: 'рқ’ңв„¬рқ’һрқ’ҹв„°в„ұрқ’ўв„Ӣв„җрқ’Ҙрқ’Ұв„’в„ірқ’©рқ’Әрқ’«рқ’¬в„ӣрқ’®рқ’Ҝрқ’°рқ’ұрқ’Ірқ’ірқ’ҙрқ’ө',
                lower: 'рқ’¶рқ’·рқ’ёрқ’№в„Ҝрқ’»в„Ҡрқ’Ҫрқ’ҫрқ’ҝрқ“Җрқ“Ғрқ“Ӯрқ“ғв„ҙрқ“…рқ“Ҷрқ“Үрқ“Ҳрқ“үрқ“Ҡрқ“Ӣрқ“Ңрқ“Қрқ“Һрқ“Ҹ'
            },
            monospace: {
                upper: 'рқҷ°рқҷұрқҷІрқҷірқҷҙрқҷөрқҷ¶рқҷ·рқҷёрқҷ№рқҷәрқҷ»рқҷјрқҷҪрқҷҫрқҷҝрқҡҖрқҡҒрқҡӮрқҡғрқҡ„рқҡ…рқҡҶрқҡҮрқҡҲрқҡү',
                lower: 'рқҡҠрқҡӢрқҡҢрқҡҚрқҡҺрқҡҸрқҡҗрқҡ‘рқҡ’рқҡ“рқҡ”рқҡ•рқҡ–рқҡ—рқҡҳрқҡҷрқҡҡрқҡӣрқҡңрқҡқрқҡһрқҡҹрқҡ рқҡЎрқҡўрқҡЈ',
                digits: 'рқҹ¶рқҹ·рқҹёрқҹ№рқҹәрқҹ»рқҹјрқҹҪрқҹҫрқҹҝ'
            }
        };

        const NORMAL_UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const NORMAL_LOWER = 'abcdefghijklmnopqrstuvwxyz';
        const NORMAL_DIGITS = '0123456789';

        function transform(text, style) {
            let res = '';
            const map = MAP[style];
            for (let char of text) {
                const upperIdx = NORMAL_UPPER.indexOf(char);
                const lowerIdx = NORMAL_LOWER.indexOf(char);
                const digitIdx = NORMAL_DIGITS.indexOf(char);

                if (upperIdx !== -1 && map.upper) {
                    res += Array.from(map.upper)[upperIdx];
                } else if (lowerIdx !== -1 && map.lower) {
                    res += Array.from(map.lower)[lowerIdx];
                } else if (digitIdx !== -1 && map.digits) {
                    res += Array.from(map.digits)[digitIdx];
                } else {
                    res += char;
                }
            }
            return res;
        }

        function updateResults() {
            const text = input.value;
            results.innerHTML = '';

            const styles = [
                { id: 'bold_serif', name: 'Bold Serif' },
                { id: 'bold_sans', name: 'Bold Sans' },
                { id: 'italic_serif', name: 'Italic Serif' },
                { id: 'bold_italic_serif', name: 'Bold Italic' },
                { id: 'script', name: 'Script/Cursive' },
                { id: 'monospace', name: 'Monospace' }
            ];

            styles.forEach(style => {
                const transformed = transform(text, style.id);
                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <div style="flex: 1;">
                        <span class="style-label">${style.name}</span>
                        <div class="result-text">${transformed}</div>
                    </div>
                    <button class="btn copy-btn" data-text="${transformed}">Copy</button>
                `;
                results.appendChild(item);
            });

            // Re-attach copy listeners
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const textToCopy = btn.getAttribute('data-text');
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        const originalText = btn.innerHTML;
                        btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied';
                        btn.style.background = '#059669';
                        setTimeout(() => {
                            btn.innerHTML = originalText;
                            btn.style.background = '';
                        }, 2000);
                    });
                });
            });
        }

        input.addEventListener('input', updateResults);
        updateResults();
    </script>
</body>
</html>

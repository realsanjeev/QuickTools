<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced QR Generator | QuickTools</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .qr-section {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
        }
        #qr-preview {
            background: #fff;
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }
        #qrcode {
            margin-bottom: 1.5rem;
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }
        .tab {
            padding: 0.5rem 1rem;
            background: #eee;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .tab.active {
            background: var(--primary-gradient);
            color: white;
        }
        .control-group {
            margin-bottom: 1rem;
        }
        .color-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 768px) {
            .qr-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-content">
            <a href="../../index.html" class="logo">QuickTools</a>
            <nav><a href="../../index.html" class="btn">Back to Home</a></nav>
        </div>
    </header>

    <main class="container tool-container">
        <div class="tool-header">
            <h1>Advanced <span class="gradient-text">QR Generator</span></h1>
            <p>Generate high-quality QR codes for any purpose.</p>
        </div>

        <div class="card">
            <div class="tabs" id="qr-tabs">
                <button class="tab active" data-type="url"><i class="fa-solid fa-link"></i> URL</button>
                <button class="tab" data-type="text"><i class="fa-solid fa-align-left"></i> Text</button>
                <button class="tab" data-type="wifi"><i class="fa-solid fa-wifi"></i> WiFi</button>
                <button class="tab" data-type="vcard"><i class="fa-solid fa-address-card"></i> vCard</button>
            </div>

            <div class="qr-section">
                <div class="qr-inputs">
                    <!-- URL Input -->
                    <div id="input-url" class="qr-input-group">
                        <div class="form-group">
                            <label>Website URL</label>
                            <input type="url" id="qr-url" placeholder="https://example.com" value="https://bhandarisanjeev.com.np">
                        </div>
                    </div>

                    <!-- Text Input -->
                    <div id="input-text" class="qr-input-group" style="display:none;">
                        <div class="form-group">
                            <label>Plain Text</label>
                            <textarea id="qr-text" rows="4" placeholder="Enter your text here..."></textarea>
                        </div>
                    </div>

                    <!-- WiFi Input -->
                    <div id="input-wifi" class="qr-input-group" style="display:none;">
                        <div class="form-group">
                            <label>Network Name (SSID)</label>
                            <input type="text" id="wifi-ssid" placeholder="MyWiFiNetwork">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="text" id="wifi-pass" placeholder="Password">
                        </div>
                        <div class="form-group">
                            <label>Encryption</label>
                            <select id="wifi-enc">
                                <option value="WPA">WPA/WPA2</option>
                                <option value="WEP">WEP</option>
                                <option value="nopass">None</option>
                            </select>
                        </div>
                    </div>

                    <!-- vCard Input -->
                    <div id="input-vcard" class="qr-input-group" style="display:none;">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="vc-name" placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" id="vc-phone" placeholder="+1234567890">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="text" id="vc-email" placeholder="john@example.com">
                        </div>
                    </div>

                    <hr style="margin: 2rem 0; border: 0; border-top: 1px solid var(--border-color);">
                    
                    <h3>Customization</h3>
                    <div class="color-inputs" style="margin-top: 1rem;">
                        <div class="form-group">
                            <label>Foreground Color</label>
                            <input type="color" id="qr-color-dark" value="#000000">
                        </div>
                        <div class="form-group">
                            <label>Background Color</label>
                            <input type="color" id="qr-color-light" value="#ffffff">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Logo (Optional)</label>
                        <input type="file" id="qr-logo" accept="image/*">
                        <small style="color: var(--text-muted);">Recommended: Square PNG with transparent background.</small>
                    </div>
                </div>

                <div id="qr-preview">
                    <div id="qrcode"></div>
                    <button id="download-btn" class="btn btn-primary" style="width: 100%;">
                        <i class="fa-solid fa-download"></i> &nbsp; Download PNG
                    </button>
                    <button id="download-svg-btn" class="btn" style="width: 100%; margin-top: 0.5rem; background: #f3f4f6;">
                         Download SVG
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/easyqrcodejs@4.4.10/dist/easy.qrcode.min.js"></script>
    <script>
        const qrcodeContainer = document.getElementById("qrcode");
        const downloadBtn = document.getElementById("download-btn");
        const downloadSvgBtn = document.getElementById("download-svg-btn");
        const tabs = document.querySelectorAll(".tab");
        const inputGroups = document.querySelectorAll(".qr-input-group");
        
        let currentType = "url";
        let logoData = null;

        let qrcode = null;

        function generateQR() {
            let text = "";
            if (currentType === "url") {
                text = document.getElementById("qr-url").value || " ";
            } else if (currentType === "text") {
                text = document.getElementById("qr-text").value || " ";
            } else if (currentType === "wifi") {
                const ssid = document.getElementById("wifi-ssid").value;
                const pass = document.getElementById("wifi-pass").value;
                const enc = document.getElementById("wifi-enc").value;
                text = `WIFI:S:${ssid};T:${enc};P:${pass};;`;
            } else if (currentType === "vcard") {
                const name = document.getElementById("vc-name").value;
                const phone = document.getElementById("vc-phone").value;
                const email = document.getElementById("vc-email").value;
                text = `BEGIN:VCARD\nVERSION:3.0\nN:${name}\nTEL:${phone}\nEMAIL:${email}\nEND:VCARD`;
            }

            const options = {
                text: text,
                width: 256,
                height: 256,
                colorDark: document.getElementById("qr-color-dark").value,
                colorLight: document.getElementById("qr-color-light").value,
                correctLevel: QRCode.CorrectLevel.H,
                logo: logoData,
                logoWidth: 60,
                logoHeight: 60,
                logoBackgroundColor: '#ffffff',
                logoBackgroundTransparent: false
            };

            qrcodeContainer.innerHTML = "";
            qrcode = new QRCode(qrcodeContainer, options);
        }

        // Handle Tabs
        tabs.forEach(tab => {
            tab.addEventListener("click", () => {
                tabs.forEach(t => t.classList.remove("active"));
                tab.classList.add("active");
                currentType = tab.dataset.type;
                
                inputGroups.forEach(group => group.style.display = "none");
                document.getElementById(`input-${currentType}`).style.display = "block";
                generateQR();
            });
        });

        // Handle Inputs
        document.querySelectorAll("input, textarea, select").forEach(el => {
            el.addEventListener("input", generateQR);
        });

        // Handle Logo Upload
        document.getElementById("qr-logo").addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    logoData = event.target.result;
                    generateQR();
                };
                reader.readAsDataURL(file);
            } else {
                logoData = null;
                generateQR();
            }
        });

        // Download PNG
        downloadBtn.addEventListener("click", () => {
            const img = qrcodeContainer.querySelector("img");
            const canvas = qrcodeContainer.querySelector("canvas");
            let dataUrl = "";

            if (img && img.src) {
                dataUrl = img.src;
            } else if (canvas) {
                dataUrl = canvas.toDataURL("image/png");
            }

            if (dataUrl) {
                const link = document.createElement("a");
                link.href = dataUrl;
                link.download = "qrcode.png";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        });

        // Download SVG (easyqrcodejs supports SVG if requested in options)
        // For simplicity with this library, PNG is the default. 
        // We can re-generate with useSVG: true if needed for high quality.
        downloadSvgBtn.addEventListener("click", () => {
             const options = {
                text: qrcode._htOption.text,
                width: 512,
                height: 512,
                colorDark: document.getElementById("qr-color-dark").value,
                colorLight: document.getElementById("qr-color-light").value,
                useSVG: true,
                correctLevel: QRCode.CorrectLevel.H
            };
            const tempDiv = document.createElement("div");
            tempDiv.style.display = "none";
            document.body.appendChild(tempDiv);
            
            new QRCode(tempDiv, options);
            
            // Wait for SVG to be rendered
            let attempts = 0;
            const checkSvg = setInterval(() => {
                const svg = tempDiv.querySelector("svg");
                attempts++;
                if (svg) {
                    clearInterval(checkSvg);
                    const svgData = new XMLSerializer().serializeToString(svg);
                    const svgBlob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
                    const svgUrl = URL.createObjectURL(svgBlob);
                    const downloadLink = document.createElement("a");
                    downloadLink.href = svgUrl;
                    downloadLink.download = "qrcode.svg";
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);
                    URL.revokeObjectURL(svgUrl);
                    document.body.removeChild(tempDiv);
                } else if (attempts > 40) { // Timeout after 2 seconds (40 * 50ms)
                    clearInterval(checkSvg);
                    document.body.removeChild(tempDiv);
                    alert("SVG generation timed out. Please try again.");
                }
            }, 50);
        });

        // Initial Generate
        window.onload = generateQR;
    </script>
</body>
</html>
